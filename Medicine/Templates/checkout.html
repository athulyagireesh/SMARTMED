<!DOCTYPE html>
<html>
<head>
{% load static %}
<title>Checkout</title>
<link rel="stylesheet" href="{% static 'css/checkout.css' %}">
</head>

<body>

<div class="navbar">
    <h2>Checkout</h2>
</div>

<div class="main">

<div class="layout">

<!-- LEFT (ADDRESS + ITEMS) -->
<div class="left">

<h3>Delivery Address</h3>

<form method="POST">
{% csrf_token %}

<input type="text" placeholder="Full Name" required>
<input type="text" placeholder="Phone Number" required>
<textarea placeholder="Full Address" required></textarea>

<h3>Order Items</h3>

{% for item in cart_items %}

<div class="item">

<img src="{{ item.product.image.url }}">

<div>
<p>{{ item.product.name }}</p>
<p>Qty: {{ item.quantity }}</p>
<p>₹{{ item.subtotal }}</p>
</div>

</div>

{% endfor %}

</div>


<!-- RIGHT (SUMMARY) -->
<div class="right">

<h3>Price Details</h3>

<p>Total: ₹{{ total }}</p>
<p>GST (18%): ₹{{ gst }}</p>

<h2>Grand Total: ₹{{ grand_total }}</h2>

<button type="submit" class="order-btn">
Place Order
</button>

</form>

</div>

</div>

</div>

</body>
</html>
