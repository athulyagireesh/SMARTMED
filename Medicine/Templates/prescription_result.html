{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Matched Medicines</title>

<link rel="stylesheet" href="{% static 'css/prescription.css' %}">
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <h2 class="logo">SmartMed</h2>
    <a href="{% url 'home' %}" class="home-btn">Home</a>
</div>

<!-- MAIN -->
<div class="main-container">

    <!-- LEFT PANEL -->
    <div class="prescription-box">
        <h3>Uploaded Prescription</h3>

        {% if prescription %}
            <img src="{{ prescription.image.url }}" class="prescription-img">
        {% endif %}
    </div>

    <!-- RIGHT PANEL -->
    <div class="medicine-box">
        <h3>Matched Medicines</h3>

        {% if products %}
        <div class="medicine-grid">

            {% for product in products %}
            <div class="medicine-card">

                <div class="img-box">
                    <img src="{{ product.image.url }}">
                </div>

                <div class="info">
                    <h4>{{ product.name }}</h4>
                    <p class="price">₹{{ product.price }}</p>
                </div>

                <a href="{% url 'add_to_cart' product.id %}">
                    <button class="cart-btn">Add to Cart</button>
                </a>

            </div>
            {% endfor %}

        </div>

        {% else %}
            <p class="no-data">No medicines found from prescription</p>
        {% endif %}

    </div>

</div>

</body>
</html>
