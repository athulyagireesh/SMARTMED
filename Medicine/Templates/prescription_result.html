<!DOCTYPE html>
<html lang="en">
<head>
{% load static %}
<meta charset="UTF-8">
<title>Prescription Result</title>

<link rel="stylesheet" href="{% static 'css/prescription.css' %}">
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">

    <div class="logo">
        <img src="{% static 'images/logoo.png' %}">
    </div>

    <div class="search">
        <form method="GET" action="{% url 'redirect_search' %}">
            <input type="text" name="q" placeholder="Search medicines...">
            <button type="submit">Search</button>
        </form>
    </div>

    <div class="nav-right">

        <!-- CART -->
        <a href="{% url 'cart' %}" class="icon-box">
            <img src="{% static 'images/crt.svg' %}">
            <span class="badge">{{ cart_count }}</span>
        </a>

        <!-- WISHLIST -->
        <a href="{% url 'wishlist_page' %}" class="icon-box">
            <img src="{% static 'images/wishlist.png' %}">
            <span class="badge">{{ wishlist_count }}</span>
        </a>

        <!-- HOME -->
        <a href="{% url 'home' %}">
            <button class="home-btn">Home</button>
        </a>

    </div>

</div>


<!-- MAIN CONTENT -->
<div class="container">

    <h2 class="title">Prescription Analysis Result</h2>

    <!-- Extracted Text -->
    <div class="text-box">
        <h3>Extracted Text</h3>
        <p>{{ text }}</p>
    </div>

    <!-- PRODUCTS -->
    <div class="products">

        {% for product in products %}

        <div class="card">

            <img src="{{ product.image.url }}">

            <h3>{{ product.name }}</h3>

            <p class="price">₹{{ product.price }}</p>

            <div class="btn-area">

                <a href="{% url 'add_to_cart' product.id %}">
                    <button class="cart-btn">Add to Cart</button>
                </a>

                <a href="{% url 'add_wishlist' product.id %}">
                    <span class="wishlist {% if product.id in wishlist_products %}active{% endif %}">
                        ♡
                    </span>
                </a>

            </div>

        </div>

        {% endfor %}

    </div>

    {% if products|length == 0 %}
        <p class="no-result">No matching medicines found ❌</p>
    {% endif %}

</div>

</body>
</html>
