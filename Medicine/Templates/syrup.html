<!DOCTYPE html>
<html lang="en">
<head>
{% load static %}
<meta charset="UTF-8">
<title>Syrups</title>
<link rel="stylesheet" href="{% static 'css/syrup.css' %}">
</head>

<body>

  
<div class="navbar">

<div class="logo">
<img src="{% static 'images/logoo.png' %}" width="170">
</div>


<div class="search">

<form method="GET" action="{% url 'home' %}">

<input type="text" name="q" value="{{ query }}" placeholder="Search medicines...">

<button type="submit">Search</button>

</form>

</div>


<div class="nav-right">


  <a href="{% url 'wishlist_page' %}" class="wishlist-icon">
<img src="{% static 'images/wishlist.png' %}" width="28">
<span class="wishlist-count">{{ wishlist_count }}</span>
</a>




<a href="{% url 'home' %}">
<button class="home-btn">Back to Home</button>
</a>

</div>

</div>
<div class="main">
<form action="" method="POST">
{% csrf_token %}

{% for product in syrups %}

<div class="product">

<img src="{{ product.image.url }}" width="150">

<h3>{{ product.name }}</h3>

<p>Price: ₹{{ product.price }}</p>

<div class="actions">

<a href="{% url 'add_to_cart' product.id %}" class="cart">
Add to Cart
</a>

<a href="{% url 'add_wishlist' product.id %}" class="wishlist-btn">
<span class="wishlist {% if product.id in wishlist_products %}active{% endif %}">
♡
</span>
</a>

</div>

</div>

{% endfor %}

</form>
</div>

</body>
</html>
